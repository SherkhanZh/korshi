name: korshi_admin
description: "Korshi — Chairman app: triage reports, post announcements, run polls, manage residents."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/splash_admin.png

# Native launch screen (shown the instant before Flutter boots).
# Generate with:  dart run flutter_native_splash:create
flutter_native_splash:
  color: "#17452F"
  background_image: "assets/splash_admin.png"
  fullscreen: true
  android_12:
    color: "#17452F"

# App launcher icon. Generate with:  dart run flutter_launcher_icons
# Adaptive icon (Android 8+) keeps the green full-bleed instead of a white tile.
flutter_launcher_icons:
  image_path: "assets/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#17452F"
  adaptive_icon_foreground: "assets/app_icon_fg.png"
