name: korshi
description: "Korshi — neighborhood app connecting KSK chairmen and residents to solve local problems."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  http: ^1.2.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  shared_preferences: ^2.2.3
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/login.png

# App launcher icon. Generate with:  dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/v1app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/v1app_icon.png"
