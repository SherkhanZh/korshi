# Korshi — production stack (single Ubuntu host, HTTP on port 80).
#   web : nginx serving the built admin panel + reverse-proxying /api → api
#   api : Express/TS backend (SQLite persisted on the korshi_data volume)
#
# Bring up:  docker compose up -d --build
services:
  api:
    build: ./server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Change this in production to secure issued JWTs.
      - JWT_SECRET=${JWT_SECRET:-korshi-prod-change-me}
    expose:
      - "3000"
    volumes:
      # Persists the SQLite database (/app/data/korshi.db) and uploaded cover image.
      - korshi_data:/app/data

  web:
    build: ./web/admin_panel
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  korshi_data:
